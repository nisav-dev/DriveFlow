<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DriveFlow — ניהול הזמנות</title>
  <link rel="stylesheet" th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css}">
  <link rel="stylesheet" th:href="@{https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css}">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/driveflow.css}">
</head>
<body style="background:var(--light-bg)">

<!-- ADMIN SIDEBAR -->
<div class="admin-sidebar">
  <div class="sidebar-brand">
    <div class="footer-logo"><span class="brand-drive">Drive</span><span class="brand-flow">Flow</span></div>
    <small style="color:rgba(255,255,255,0.45);font-size:0.75rem">ממשק ניהול</small>
  </div>
  <nav class="mt-2">
    <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-grid-1x2"></i>Dashboard</a>
    <a class="nav-link" th:href="@{/admin/vehicles}"><i class="bi bi-car-front"></i>ניהול רכבים</a>
    <a class="nav-link active" th:href="@{/admin/bookings}"><i class="bi bi-calendar-check"></i>ניהול הזמנות</a>
    <hr style="border-color:rgba(255,255,255,0.1);margin:12px 16px">
    <a class="nav-link" th:href="@{/admin/export/bookings}"><i class="bi bi-file-earmark-excel"></i>ייצוא הזמנות</a>
    <a class="nav-link" th:href="@{/admin/export/vehicles}"><i class="bi bi-file-earmark-spreadsheet"></i>ייצוא רכבים</a>
    <hr style="border-color:rgba(255,255,255,0.1);margin:12px 16px">
    <a class="nav-link" th:href="@{/swagger-ui.html}" target="_blank"><i class="bi bi-code-square"></i>Swagger API</a>
    <a class="nav-link" th:href="@{/}"><i class="bi bi-box-arrow-left"></i>יציאה לאתר</a>
  </nav>
</div>

<!-- CONTENT -->
<div class="admin-content">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="fw-800 mb-0" style="color:var(--primary)">
        <i class="bi bi-calendar-check me-2"></i>ניהול הזמנות
      </h4>
      <small class="text-muted"><span th:text="${#lists.size(bookings)}">0</span> הזמנות</small>
    </div>
  </div>

  <div th:if="${success}" class="alert alert-success d-flex align-items-center gap-2 mb-4">
    <i class="bi bi-check-circle-fill"></i><span th:text="${success}"></span>
  </div>

  <div class="bg-white rounded-xl shadow-card">
    <div class="table-responsive">
      <table class="table stat-table mb-0">
        <thead>
          <tr>
            <th>מספר הזמנה</th>
            <th>לקוח</th>
            <th>רכב</th>
            <th>איסוף</th>
            <th>החזרה</th>
            <th>ימים</th>
            <th>סה"כ</th>
            <th>סטטוס</th>
            <th>פרטים</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="booking : ${bookings}">
            <td><code class="small" th:text="${booking.bookingNumber}">DF-001</code></td>
            <td th:text="${booking.customer.user.getFullName()}">לקוח</td>
            <td>
              <div th:text="${booking.vehicle.make + ' ' + booking.vehicle.model}">רכב</div>
              <div class="text-muted small" th:text="${booking.pickupBranch.name}">סניף</div>
            </td>
            <td th:text="${#temporals.format(booking.pickupDatetime, 'dd/MM/yy')}">תאריך</td>
            <td th:text="${#temporals.format(booking.returnDatetime, 'dd/MM/yy')}">תאריך</td>
            <td th:text="${booking.numDays}">1</td>
            <td class="fw-700" th:text="'₪' + ${booking.totalPrice}">₪0</td>
            <td>
              <span class="status-badge"
                    th:classappend="${booking.status.name() == 'CONFIRMED'} ? 'status-confirmed' :
                                     (${booking.status.name() == 'ACTIVE'} ? 'status-active' :
                                     (${booking.status.name() == 'PENDING'} ? 'status-pending' :
                                     (${booking.status.name() == 'CANCELLED'} ? 'status-cancelled' : 'status-completed')))"
                    th:switch="${booking.status.name()}">
                <span th:case="'PENDING'">ממתין</span>
                <span th:case="'CONFIRMED'">מאושר</span>
                <span th:case="'ACTIVE'">פעיל</span>
                <span th:case="'COMPLETED'">הושלם</span>
                <span th:case="'COMPLETED_WITH_DAMAGE'">הושלם + נזק</span>
                <span th:case="'CANCELLED'">בוטל</span>
                <span th:case="*" th:text="${booking.status.name()}"></span>
              </span>
            </td>
            <td>
              <a th:href="@{/admin/bookings/{id}(id=${booking.id})}"
                 class="btn btn-sm btn-outline-primary rounded-2">
                <i class="bi bi-eye"></i>
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
