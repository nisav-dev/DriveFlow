<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DriveFlow — הוספת רכב</title>
  <link rel="stylesheet" th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css}">
  <link rel="stylesheet" th:href="@{https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css}">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/driveflow.css}">
</head>
<body style="background:var(--light-bg)">

<!-- ADMIN SIDEBAR -->
<div class="admin-sidebar">
  <div class="sidebar-brand">
    <div class="footer-logo"><span class="brand-drive">Drive</span><span class="brand-flow">Flow</span></div>
    <small style="color:rgba(255,255,255,0.45);font-size:0.75rem">ממשק ניהול</small>
  </div>
  <nav class="mt-2">
    <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-grid-1x2"></i>Dashboard</a>
    <a class="nav-link active" th:href="@{/admin/vehicles}"><i class="bi bi-car-front"></i>ניהול רכבים</a>
    <a class="nav-link" th:href="@{/admin/bookings}"><i class="bi bi-calendar-check"></i>ניהול הזמנות</a>
    <hr style="border-color:rgba(255,255,255,0.1);margin:12px 16px">
    <a class="nav-link" th:href="@{/}"><i class="bi bi-box-arrow-left"></i>יציאה לאתר</a>
  </nav>
</div>

<!-- CONTENT -->
<div class="admin-content">

  <div class="d-flex align-items-center gap-3 mb-4">
    <a th:href="@{/admin/vehicles}" class="btn btn-outline-secondary btn-sm rounded-3">
      <i class="bi bi-arrow-right me-1"></i>חזור
    </a>
    <h4 class="fw-800 mb-0" style="color:var(--primary)">
      <i class="bi bi-plus-circle me-2"></i>הוספת רכב חדש
    </h4>
  </div>

  <div class="bg-white rounded-xl p-4 shadow-card">
    <form th:action="@{/admin/vehicles}" method="post">

      <div class="row g-3 mb-4">
        <h6 class="fw-700 text-muted text-uppercase" style="font-size:0.8rem;letter-spacing:0.5px">פרטי הרכב</h6>
        <div class="col-md-4">
          <label class="form-label">יצרן</label>
          <input type="text" name="make" class="form-control" placeholder="Toyota" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">דגם</label>
          <input type="text" name="model2" class="form-control" placeholder="Corolla" required>
        </div>
        <div class="col-md-2">
          <label class="form-label">שנה</label>
          <input type="number" name="year" class="form-control" placeholder="2024" min="2010" max="2030" required>
        </div>
        <div class="col-md-2">
          <label class="form-label">צבע</label>
          <input type="text" name="color" class="form-control" placeholder="לבן" required>
        </div>
        <div class="col-md-4">
          <label class="form-label"><i class="bi bi-card-text me-1 text-primary"></i>לוחית רישוי</label>
          <input type="text" name="licensePlate" class="form-control" placeholder="00-000-00" required>
        </div>
        <div class="col-md-4">
          <label class="form-label"><i class="bi bi-tag me-1 text-primary"></i>קטגוריה</label>
          <select name="categoryId" class="form-select" required>
            <option value="">בחר קטגוריה...</option>
            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label"><i class="bi bi-building me-1 text-primary"></i>סניף</label>
          <select name="branchId" class="form-select" required>
            <option value="">בחר סניף...</option>
            <option th:each="branch : ${branches}" th:value="${branch.id}" th:text="${branch.name}"></option>
          </select>
        </div>
      </div>

      <hr class="my-3">

      <div class="row g-3 mb-4">
        <h6 class="fw-700 text-muted text-uppercase" style="font-size:0.8rem;letter-spacing:0.5px">מפרט טכני</h6>
        <div class="col-md-3">
          <label class="form-label"><i class="bi bi-gear me-1 text-primary"></i>תיבת הילוכים</label>
          <select name="transmission" class="form-select" required>
            <option th:each="t : ${transmissions}" th:value="${t.name()}"
                    th:text="${t.name() == 'AUTOMATIC'} ? 'אוטומטי' : 'ידני'"></option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label"><i class="bi bi-fuel-pump me-1 text-primary"></i>סוג דלק</label>
          <select name="fuelType" class="form-select" required>
            <option th:each="f : ${fuelTypes}" th:value="${f.name()}"
                    th:text="${f.name() == 'PETROL'} ? 'בנזין' :
                              (${f.name() == 'DIESEL'} ? 'דיזל' :
                              (${f.name() == 'HYBRID'} ? 'היברידי' :
                              (${f.name() == 'ELECTRIC'} ? 'חשמלי' : ${f.name()})))"></option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label"><i class="bi bi-people me-1 text-primary"></i>מושבים</label>
          <input type="number" name="numSeats" class="form-control" value="5" min="2" max="9" required>
        </div>
        <div class="col-md-2">
          <label class="form-label"><i class="bi bi-door-open me-1 text-primary"></i>דלתות</label>
          <input type="number" name="numDoors" class="form-control" value="5" min="2" max="5" required>
        </div>
        <div class="col-md-2">
          <label class="form-label"><i class="bi bi-currency-shekel me-1 text-primary"></i>מחיר/יום (₪)</label>
          <input type="number" name="dailyRate" class="form-control" placeholder="185" min="50" step="5" required>
        </div>
        <div class="col-md-6">
          <label class="form-label"><i class="bi bi-image me-1 text-primary"></i>קישור לתמונה (אופציונלי)</label>
          <input type="url" name="mainImageUrl" class="form-control" placeholder="https://...">
        </div>
      </div>

      <div class="d-flex gap-2 justify-content-end">
        <a th:href="@{/admin/vehicles}" class="btn btn-outline-secondary rounded-3 px-4">ביטול</a>
        <button type="submit" class="btn btn-gold rounded-3 px-4">
          <i class="bi bi-check-lg me-1"></i>שמור רכב
        </button>
      </div>

    </form>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
