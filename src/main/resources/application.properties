spring.application.name=DriveFlow

# Database
# Local default: H2 file DB
# Cloud: override with SPRING_DATASOURCE_* env vars (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/driveflowdb}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA / Hibernate
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# H2 Console (dev only) — accessible at /h2-console
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Server (Render/Railway inject PORT)
server.port=${PORT:8080}

# Mail — disable auto-configuration (no real SMTP needed for this academic project)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
