<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="he" dir="rtl"
      th:replace="~{layout/base :: html(content=~{::main}, pageTitle='האזור האישי')}">
<body><main>

<div class="page-hero py-4">
  <div class="container">
    <h2 class="fw-800"><i class="bi bi-person-circle me-2"></i>האזור האישי</h2>
    <p class="mb-0 opacity-75" th:text="'שלום, ' + ${customer.user.firstName} + '!'">שלום</p>
  </div>
</div>

<div class="container py-5">
  <div class="row g-4">

    <!-- Profile card -->
    <div class="col-lg-4">
      <div class="bg-white rounded-xl p-4 shadow-card mb-4">
        <div class="text-center mb-4">
          <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
               style="width:72px;height:72px;background:linear-gradient(135deg,var(--primary),var(--primary-light))">
            <i class="bi bi-person-fill" style="color:#fff;font-size:2rem"></i>
          </div>
          <h5 class="fw-700 mb-0" style="color:var(--primary)" th:text="${customer.user.getFullName()}">שם</h5>
          <p class="text-muted small" th:text="${customer.user.email}">email</p>
        </div>

        <div class="d-flex align-items-center justify-content-between p-3 rounded-3 mb-3"
             style="background:linear-gradient(135deg,#FFF9E6,#FFF3CD);border:1px solid #F0D060">
          <div>
            <div class="text-muted small">נקודות נאמנות</div>
            <div class="fw-800" style="font-size:1.4rem;color:var(--accent)" th:text="${customer.loyaltyPoints}">0</div>
          </div>
          <i class="bi bi-star-fill" style="font-size:2rem;color:var(--accent);opacity:0.4"></i>
        </div>

        <ul class="list-unstyled small">
          <li class="mb-2" th:if="${customer.user.phone != null}">
            <i class="bi bi-phone me-2 text-primary"></i>
            <span th:text="${customer.user.phone}">טלפון</span>
          </li>
          <li class="mb-2" th:if="${customer.licenseNumber != null}">
            <i class="bi bi-card-text me-2 text-primary"></i>
            <span>רישיון: </span><span th:text="${customer.licenseNumber}">RL-000</span>
          </li>
          <li class="mb-2" th:if="${customer.licenseExpiry != null}">
            <i class="bi bi-calendar3 me-2" th:classappend="${customer.hasValidLicense()} ? 'text-success' : 'text-danger'"></i>
            <span>תוקף: </span>
            <span th:text="${#temporals.format(customer.licenseExpiry, 'MM/yyyy')}">01/2028</span>
            <span class="badge ms-1"
                  th:classappend="${customer.hasValidLicense()} ? 'bg-success' : 'bg-danger'"
                  th:text="${customer.hasValidLicense()} ? 'תקף' : 'פג תוקף'"></span>
          </li>
        </ul>
      </div>

      <div class="bg-white rounded-xl p-4 shadow-card">
        <h6 class="fw-700 mb-3" style="color:var(--primary)">ניווט מהיר</h6>
        <a th:href="@{/my-account/bookings}" class="d-flex align-items-center gap-2 text-decoration-none text-dark p-2 rounded-3 mb-2"
           style="transition:background 0.2s" onmouseover="this.style.background='var(--light-bg)'" onmouseout="this.style.background=''">
          <i class="bi bi-calendar-check text-primary"></i>
          <span>ההזמנות שלי</span>
          <i class="bi bi-chevron-left ms-auto text-muted" style="font-size:0.8rem"></i>
        </a>
        <a th:href="@{/search}" class="d-flex align-items-center gap-2 text-decoration-none text-dark p-2 rounded-3"
           style="transition:background 0.2s" onmouseover="this.style.background='var(--light-bg)'" onmouseout="this.style.background=''">
          <i class="bi bi-search text-primary"></i>
          <span>הזמן רכב חדש</span>
          <i class="bi bi-chevron-left ms-auto text-muted" style="font-size:0.8rem"></i>
        </a>
      </div>
    </div>

    <!-- Recent bookings -->
    <div class="col-lg-8">
      <div class="bg-white rounded-xl p-4 shadow-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h5 class="fw-700 mb-0" style="color:var(--primary)">
            <i class="bi bi-clock-history me-2"></i>הזמנות אחרונות
          </h5>
          <a th:href="@{/my-account/bookings}" class="btn btn-outline-primary btn-sm rounded-3">
            כל ההזמנות
          </a>
        </div>

        <div th:if="${#lists.isEmpty(bookings)}" class="text-center py-5">
          <i class="bi bi-calendar-x" style="font-size:3rem;color:var(--border)"></i>
          <p class="text-muted mt-2">אין הזמנות עדיין</p>
          <a th:href="@{/search}" class="btn btn-primary mt-2">
            <i class="bi bi-search me-1"></i>הזמן רכב עכשיו
          </a>
        </div>

        <div th:unless="${#lists.isEmpty(bookings)}">
          <div th:each="booking,iter : ${bookings}" th:if="${iter.index < 3}"
               class="d-flex gap-3 align-items-center p-3 rounded-3 mb-3"
               style="background:var(--light-bg)">
            <img class="dashboard-booking-image flex-shrink-0"
                 th:src="${booking.vehicle.imageUrl}"
                 th:alt="${booking.vehicle.displayName}">
            <div class="flex-grow-1">
              <div class="fw-700 small" th:text="${booking.vehicle.getDisplayName()}">רכב</div>
              <div class="text-muted" style="font-size:0.8rem">
                <span th:text="${#temporals.format(booking.pickupDatetime, 'dd/MM/yyyy')}"></span>
                —
                <span th:text="${#temporals.format(booking.returnDatetime, 'dd/MM/yyyy')}"></span>
              </div>
            </div>
            <div class="text-end">
              <span class="status-badge"
                    th:classappend="${'status-' + booking.status.name().toLowerCase().replace('_','-')}"
                    th:switch="${booking.status.name()}">
                <span th:case="'PENDING'">ממתין</span>
                <span th:case="'CONFIRMED'">מאושר</span>
                <span th:case="'ACTIVE'">פעיל</span>
                <span th:case="'COMPLETED'">הושלם</span>
                <span th:case="'CANCELLED'">בוטל</span>
                <span th:case="*" th:text="${booking.status.name()}"></span>
              </span>
              <div class="fw-700 small mt-1 text-primary" th:text="'₪' + ${booking.totalPrice}"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

</main></body></html>
