<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DriveFlow — ניהול רכבים</title>
  <link rel="stylesheet" th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css}">
  <link rel="stylesheet" th:href="@{https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css}">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/driveflow.css}">
</head>
<body style="background:var(--light-bg)">

<!-- ADMIN SIDEBAR -->
<div class="admin-sidebar">
  <div class="sidebar-brand">
    <div class="footer-logo"><span class="brand-drive">Drive</span><span class="brand-flow">Flow</span></div>
    <small style="color:rgba(255,255,255,0.45);font-size:0.75rem">ממשק ניהול</small>
  </div>
  <nav class="mt-2">
    <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-grid-1x2"></i>Dashboard</a>
    <a class="nav-link active" th:href="@{/admin/vehicles}"><i class="bi bi-car-front"></i>ניהול רכבים</a>
    <a class="nav-link" th:href="@{/admin/bookings}"><i class="bi bi-calendar-check"></i>ניהול הזמנות</a>
    <hr style="border-color:rgba(255,255,255,0.1);margin:12px 16px">
    <a class="nav-link" th:href="@{/admin/export/bookings}"><i class="bi bi-file-earmark-excel"></i>ייצוא הזמנות</a>
    <a class="nav-link" th:href="@{/admin/export/vehicles}"><i class="bi bi-file-earmark-spreadsheet"></i>ייצוא רכבים</a>
    <hr style="border-color:rgba(255,255,255,0.1);margin:12px 16px">
    <a class="nav-link" th:href="@{/swagger-ui.html}" target="_blank"><i class="bi bi-code-square"></i>Swagger API</a>
    <a class="nav-link" th:href="@{/}"><i class="bi bi-box-arrow-left"></i>יציאה לאתר</a>
  </nav>
</div>

<!-- CONTENT -->
<div class="admin-content">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="fw-800 mb-0" style="color:var(--primary)">
        <i class="bi bi-car-front me-2"></i>ניהול רכבים
      </h4>
      <small class="text-muted"><span th:text="${#lists.size(vehicles)}">0</span> רכבים בצי</small>
    </div>
    <a th:href="@{/admin/vehicles/new}" class="btn btn-gold rounded-3">
      <i class="bi bi-plus-lg me-1"></i>הוסף רכב
    </a>
  </div>

  <div th:if="${success}" class="alert alert-success d-flex align-items-center gap-2 mb-4">
    <i class="bi bi-check-circle-fill"></i><span th:text="${success}"></span>
  </div>

  <div class="bg-white rounded-xl shadow-card">
    <div class="table-responsive">
      <table class="table stat-table mb-0">
        <thead>
          <tr>
            <th>רכב</th>
            <th>לוחית רישוי</th>
            <th>סניף</th>
            <th>קטגוריה</th>
            <th>מחיר/יום</th>
            <th>סטטוס</th>
            <th>פעולות</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="vehicle : ${vehicles}">
            <td>
              <div class="fw-700" th:text="${vehicle.getDisplayName()}">רכב</div>
              <div class="text-muted small">
                <span th:text="${vehicle.numSeats}">5</span> מושבים ·
                <span th:if="${vehicle.transmission.name() == 'AUTOMATIC'}">אוטומטי</span>
                <span th:unless="${vehicle.transmission.name() == 'AUTOMATIC'}">ידני</span>
              </div>
            </td>
            <td><code class="small" th:text="${vehicle.licensePlate}">00-000-00</code></td>
            <td th:text="${vehicle.branch.name}">סניף</td>
            <td><span class="badge bg-light text-dark border" th:text="${vehicle.category.name}">Economy</span></td>
            <td class="fw-700" th:text="'₪' + ${vehicle.dailyRate}">₪0</td>
            <td>
              <span class="status-badge"
                    th:classappend="${vehicle.status.name() == 'AVAILABLE'} ? 'status-active' :
                                     (${vehicle.status.name() == 'RENTED'} ? 'status-confirmed' :
                                     (${vehicle.status.name() == 'MAINTENANCE'} ? 'status-pending' : 'status-cancelled'))"
                    th:switch="${vehicle.status.name()}">
                <span th:case="'AVAILABLE'">זמין</span>
                <span th:case="'RENTED'">מושכר</span>
                <span th:case="'MAINTENANCE'">תחזוקה</span>
                <span th:case="'RETIRED'">יצא משירות</span>
                <span th:case="*" th:text="${vehicle.status.name()}"></span>
              </span>
            </td>
            <td>
              <div class="d-flex gap-1">
                <form th:action="@{/admin/vehicles/{id}/status(id=${vehicle.id})}" method="post">
                  <select name="status" class="form-select form-select-sm w-auto" onchange="this.form.submit()"
                          style="font-size:0.8rem;min-width:110px">
                    <option th:each="s : ${T(com.driveflow.enums.VehicleStatus).values()}"
                            th:value="${s.name()}"
                            th:text="${s.name() == 'AVAILABLE'} ? 'זמין' :
                                      (${s.name() == 'RENTED'} ? 'מושכר' :
                                      (${s.name() == 'MAINTENANCE'} ? 'תחזוקה' : 'יצא משירות'))"
                            th:selected="${s.name() == vehicle.status.name()}"></option>
                  </select>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
