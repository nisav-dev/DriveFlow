<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="he" dir="rtl"
      th:replace="~{layout/base :: html(content=~{::main}, pageTitle='הרשמה')}">
<body><main>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7">

      <div class="text-center mb-4">
        <h2 class="fw-800" style="color:var(--primary)">הרשמה ל-DriveFlow</h2>
        <p class="text-muted">צור חשבון חדש ותתחיל להזמין רכב</p>
      </div>

      <div class="bg-white rounded-xl p-4 shadow-card">

        <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
          <i class="bi bi-exclamation-triangle-fill"></i>
          <span th:text="${error}">שגיאה</span>
        </div>

        <form th:action="@{/register}" method="post" id="registerForm">
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-person me-1 text-primary"></i>שם פרטי</label>
              <input type="text" name="firstName" class="form-control" placeholder="שם פרטי" required>
            </div>
            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-person me-1 text-primary"></i>שם משפחה</label>
              <input type="text" name="lastName" class="form-control" placeholder="שם משפחה" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label"><i class="bi bi-envelope me-1 text-primary"></i>כתובת מייל</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
          </div>

          <div class="mb-3">
            <label class="form-label"><i class="bi bi-phone me-1 text-primary"></i>מספר טלפון</label>
            <input type="tel" name="phone" class="form-control" placeholder="050-0000000">
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-lock me-1 text-primary"></i>סיסמה</label>
              <input type="password" name="password" class="form-control" placeholder="לפחות 8 תווים" required minlength="8">
            </div>
            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-lock-fill me-1 text-primary"></i>אימות סיסמה</label>
              <input type="password" name="confirmPassword" class="form-control" placeholder="חזור על הסיסמה" required minlength="8">
            </div>
          </div>

          <hr class="my-3">
          <p class="text-muted small mb-3"><i class="bi bi-info-circle me-1"></i>פרטי רישיון נהיגה (ניתן להשלים לאחר ההרשמה)</p>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-card-text me-1 text-primary"></i>מספר רישיון</label>
              <input type="text" name="licenseNumber" class="form-control" placeholder="IL-000000">
            </div>
            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-calendar3 me-1 text-primary"></i>תוקף רישיון</label>
              <input type="date" name="licenseExpiry" class="form-control">
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label"><i class="bi bi-credit-card me-1 text-primary"></i>תעודת זהות</label>
            <input type="text" name="idNumber" class="form-control" placeholder="9 ספרות" maxlength="9">
          </div>

          <button type="submit" class="btn btn-search">
            <i class="bi bi-person-check me-2"></i>הרשמה ויצירת חשבון
          </button>
        </form>

        <script>
          document.getElementById('registerForm').addEventListener('submit', function(e) {
            const pw = document.querySelector('input[name="password"]').value;
            const cpw = document.querySelector('input[name="confirmPassword"]').value;
            if (pw !== cpw) {
              e.preventDefault();
              const err = document.querySelector('.alert-danger') || document.createElement('div');
              err.className = 'alert alert-danger d-flex align-items-center gap-2 mb-3';
              err.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i><span>הסיסמאות אינן תואמות</span>';
              this.insertBefore(err, this.firstChild);
              window.scrollTo(0, 0);
            }
          });
        </script>

        <hr class="my-4">
        <div class="text-center">
          <p class="text-muted mb-2" style="font-size:0.9rem">כבר יש לך חשבון?</p>
          <a th:href="@{/login}" class="btn btn-outline-primary rounded-pill px-4">
            <i class="bi bi-box-arrow-in-right me-1"></i>כניסה
          </a>
        </div>

      </div>
    </div>
  </div>
</div>

</main></body></html>
