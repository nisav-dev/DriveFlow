<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="he" dir="rtl"
      th:replace="~{layout/base :: html(content=~{::main}, pageTitle='כניסה לחשבון')}">
<body><main>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center gap-2 mb-3">
          <i class="bi bi-person-circle" style="font-size:2.5rem;color:var(--primary)"></i>
        </div>
        <h2 class="fw-800" style="color:var(--primary)">כניסה לחשבון</h2>
        <p class="text-muted">ברוך הבא ל-DriveFlow</p>
      </div>

      <div class="bg-white rounded-xl p-4 shadow-card">

        <!-- Error / Success messages -->
        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2 mb-3" role="alert">
          <i class="bi bi-exclamation-triangle-fill"></i>
          <span>פרטי הכניסה שגויים. אנא נסה שוב.</span>
        </div>
        <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center gap-2 mb-3" role="alert">
          <i class="bi bi-check-circle-fill"></i>
          <span>יצאת מהמערכת בהצלחה.</span>
        </div>

        <form th:action="@{/login}" method="post">
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-envelope me-1 text-primary"></i>כתובת מייל</label>
            <input type="email" name="username" class="form-control" placeholder="you@example.com" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-lock me-1 text-primary"></i>סיסמה</label>
            <input type="password" name="password" class="form-control" placeholder="הסיסמה שלך" required>
          </div>
          <!-- Remember Me -->
          <div class="mb-4 d-flex align-items-center gap-2">
            <input class="form-check-input mt-0" type="checkbox" name="remember-me" id="rememberMe">
            <label class="form-check-label small text-muted" for="rememberMe">
              <i class="bi bi-clock me-1"></i>זכור אותי למשך 14 יום
            </label>
          </div>
          <button type="submit" class="btn btn-search">
            <i class="bi bi-box-arrow-in-right me-2"></i>כניסה
          </button>
        </form>

        <hr class="my-4">

        <div class="text-center">
          <p class="text-muted mb-2" style="font-size:0.9rem">עוד לא רשום?</p>
          <a th:href="@{/register}" class="btn btn-outline-primary rounded-pill px-4">
            <i class="bi bi-person-plus me-1"></i>הרשמה חינם
          </a>
        </div>

        <div class="mt-4 p-3 rounded-3" style="background:var(--light-bg);font-size:0.82rem">
          <div class="fw-700 mb-1 text-muted">חשבונות לדמו:</div>
          <div><i class="bi bi-shield-fill text-danger me-1"></i>מנהל: admin@driveflow.co.il / Admin1234</div>
          <div><i class="bi bi-person-badge text-warning me-1"></i>סוכן: agent@driveflow.co.il / Agent1234</div>
          <div><i class="bi bi-person text-primary me-1"></i>לקוח: yossi@example.com / Yossi1234</div>
        </div>
      </div>

    </div>
  </div>
</div>

</main></body></html>
